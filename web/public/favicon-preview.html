<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Favicon preview</title>
  <style>
    body { background:#0f172a; color:#e2e8f0; font:14px system-ui; padding:32px; }
    .row { display:flex; gap:24px; align-items:flex-end; margin:24px 0; padding:16px; background:#1e293b; border-radius:8px; }
    .row span { display:block; color:#94a3b8; font-size:11px; text-align:center; margin-top:6px; }
    img { display:block; image-rendering:auto; }
    .light { background:#f8fafc; color:#0f172a; }
    .light span { color:#475569; }
    h2 { color:#cbd5e1; margin:24px 0 8px; }
    .browser-tab { display:inline-flex; align-items:center; gap:8px; background:#334155; color:#f1f5f9; padding:6px 12px; border-radius:6px 6px 0 0; }
  </style>
</head>
<body>
  <h1>Favicon — Option A (shield + agent node-graph)</h1>

  <h2>Dark backdrop (matches site)</h2>
  <div class="row">
    <div><img src="/favicon-preview-A.svg" width="16" height="16"/><span>16px (tab)</span></div>
    <div><img src="/favicon-preview-A.svg" width="24" height="24"/><span>24px</span></div>
    <div><img src="/favicon-preview-A.svg" width="32" height="32"/><span>32px (taskbar)</span></div>
    <div><img src="/favicon-preview-A.svg" width="48" height="48"/><span>48px</span></div>
    <div><img src="/favicon-preview-A.svg" width="64" height="64"/><span>64px</span></div>
    <div><img src="/favicon-preview-A.svg" width="128" height="128"/><span>128px</span></div>
    <div><img src="/favicon-preview-A.svg" width="180" height="180"/><span>180px (apple)</span></div>
  </div>

  <h2>Light backdrop</h2>
  <div class="row light">
    <div><img src="/favicon-preview-A.svg" width="16" height="16"/><span>16px</span></div>
    <div><img src="/favicon-preview-A.svg" width="32" height="32"/><span>32px</span></div>
    <div><img src="/favicon-preview-A.svg" width="64" height="64"/><span>64px</span></div>
    <div><img src="/favicon-preview-A.svg" width="128" height="128"/><span>128px</span></div>
  </div>

  <h2>Simulated browser tab</h2>
  <div class="browser-tab">
    <img src="/favicon-preview-A.svg" width="16" height="16"/>
    AI Safety &amp; Security Certification
  </div>
</body>
</html>
